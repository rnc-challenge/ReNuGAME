<style>
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif; background: #f6f7fb; margin: 0; padding: 24px; }
.app { max-width: 1180px; margin: auto; }
h1 { margin-top: 0; }
.panel { background: white; border-radius: 16px; padding: 16px; margin: 12px 0; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
.controls { display: flex; gap: 12px; margin: 12px 0; }
button, select { font-size: 16px; padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; }
button { cursor: pointer; background: #2563eb; color: white; border: none; }
button:disabled { background: #aaa; cursor: not-allowed; }
.status-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 12px; }
.status-item { background: #eef2ff; border-radius: 12px; padding: 12px; text-align: center; font-weight: 700; }
.status-value { font-size: 24px; margin-top: 4px; }
.history-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.history-table th, .history-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
.history-table th { background: #eef2ff; }
.hand { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.card, .event-face { border: 2px solid #ddd; border-radius: 14px; padding: 12px; background: #fff; }
.event-back { border: 3px dashed #b91c1c; background: #fff1f2; border-radius: 16px; padding: 28px; text-align: center; }
.card h4 { margin: 0 0 8px; font-size: 16px; }
.card .meta, .event-face .meta { color: #555; font-size: 13px; margin: 4px 0; }
.card .effect, .event-face .effect { font-weight: 700; margin: 8px 0; }
.card button { width: 100%; margin-top: 8px; }
.permanent { display: flex; flex-wrap: wrap; gap: 8px; }
.badge { background: #dbeafe; color: #1e40af; border-radius: 999px; padding: 6px 10px; font-weight: 700; }
.hidden { display: none; }
pre { white-space: pre-wrap; }
</style>
