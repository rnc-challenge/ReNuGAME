<!doctype html>
<html>
<head>
  <base target="_top">
  <?!= include('Style'); ?>
</head>
<body>
  <div class="app">
    <h1>リハ栄養カードゲーム v0.8</h1>

    <div class="topbar">
      <select id="patientSelect"></select>
      <button onclick="startGame()">🎮 最初から始める</button>
      <button onclick="restartSamePatient()">🔄 同じ患者でもう一度</button>
    </div>

    <div id="game" class="hidden layout">
      <aside class="panel patient-panel">
        <h2 id="patientName"></h2>
        <div id="patientProfile"></div>
      </aside>

      <main>
        <div class="panel">
          <h3>現在のステータス</h3>
          <div id="status" class="status-grid"></div>
        </div>

        <div class="panel">
          <h3>ステータス推移</h3>
          <div id="statusHistory"></div>
        </div>

        <div class="panel event">
          <h3>イベント</h3>
          <div id="eventCard"></div>
        </div>

        <div class="panel">
          <h3>手札</h3>
          <div id="turn"></div>
          <div id="hand" class="hand"></div>
        </div>

        <div class="panel">
          <h3>永続カード</h3>
          <div id="permanentCards" class="permanent"></div>
        </div>

        <div class="controls">
          <button onclick="nextTurn()">効果を確認して次のターンへ</button>
        </div>

        <div class="panel">
          <h3>ログ</h3>
          <pre id="log"></pre>
        </div>
      </main>
    </div>

    <div id="empty" class="panel">
      患者を選択して「最初から始める」を押す。
    </div>
  </div>

  <?!= include('Script'); ?>
</body>
</html>
